{% extends "base.html" %}
{% block title %}Request Kit{% endblock %}
{% block content %}
  <section class="card narrow">
    <h1>Request Kit</h1>
    <p>Need gear for a trip? Fill this in and a committee member will get back to you.</p>
    <form method="post">
      <label for="requester_name">Your name</label>
      <input type="text" id="requester_name" name="requester_name" required>

      <label for="requester_email">Your email</label>
      <input type="email" id="requester_email" name="requester_email">

      <label for="item_name">Item needed</label>
      <input type="text" id="item_name" name="item_name" list="item-options" required placeholder="e.g. 50m rope">
      <datalist id="item-options">
        {% for item in items %}
          <option value="{{ item.name }}">
        {% endfor %}
      </datalist>

      <label for="quantity">Quantity</label>
      <input type="number" id="quantity" name="quantity" min="1" value="1">

      <label for="message">Notes (dates needed, trip details, etc.)</label>
      <textarea id="message" name="message" rows="4"></textarea>

      <button type="submit" class="btn btn-primary">Send Request</button>
    </form>
  </section>
{% endblock %}
